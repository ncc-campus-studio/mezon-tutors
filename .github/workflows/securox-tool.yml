name: Securox Security Scan

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  securox-scan:
    name: Securox Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Securox Scanner
        uses: duy6019/securox-tool@main
        with:
          fail-on: 'none'
          format: 'hbs'
          targetPath: '.'

      - name: Setup Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Convert HBS to HTML
        if: always()
        run: |
          npm install -g handlebars
          find . -name "*.hbs" -type f | while read file; do
            output="${file%.hbs}.html"
            echo "Converting $file to $output"
            handlebars "$file" -f "$output" || echo "Failed to convert $file"
          done

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: securox-security-report
          path: |
            **/*.hbs
            **/*.html
            **/securox-report.*
            **/security-report.*
          retention-days: 30
