name: Securox Security Scan

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  securox-scan:
    name: Securox Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Securox Scanner
        id: scan
        continue-on-error: true
        uses: duy6019/securox-tool@main
        with:
          fail-on: 'none'
          format: 'hbs'
          output: 'securox-report.hbs'
          targetPath: '.'

      - name: List generated files
        if: always()
        run: |
          echo "=== Files in current directory ==="
          ls -la
          echo "=== Searching for report files ==="
          find . -name "*report*" -o -name "*.hbs" -o -name "*.html" | head -20

      - name: Setup Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Convert HBS to HTML
        if: always()
        run: |
          echo "Installing handlebars-cli..."
          npm install -g handlebars

          echo "Looking for HBS files..."
          if [ -f "securox-report.hbs" ]; then
            echo "Found securox-report.hbs, converting to HTML..."
            cp securox-report.hbs securox-report.html
            echo "Report saved as securox-report.html"
          else
            echo "No securox-report.hbs found, searching for other HBS files..."
            find . -name "*.hbs" -type f | while read file; do
              output="${file%.hbs}.html"
              echo "Converting $file to $output"
              cp "$file" "$output" || echo "Failed to convert $file"
            done
          fi

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: securox-security-report
          path: |
            **/*.hbs
            **/*.html
            **/securox-report.*
            **/security-report.*
          retention-days: 30
