services:
  postgres:
    image: postgres:17
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-6543}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production

volumes:
  pgdata:
